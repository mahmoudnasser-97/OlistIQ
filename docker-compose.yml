version: '3.8'

# =============================================================================
# OlistIQ — Unified Data Engineering Platform
# Combines: Batch Pipeline (Airflow + Spark + MinIO + PostgreSQL)
#         + Streaming Pipeline (Kafka + Spark Structured Streaming + Redis + Streamlit)
# =============================================================================

x-airflow-common: &airflow-common
  image: apache/airflow:2.7.1-python3.9
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__WEBSERVER__BASE_URL: http://localhost:8089
    AIRFLOW__CORE__FERNET_KEY: 3DjyQsK6JdTq4zsiK4XHzVmVEMtRzF7jwq9VDuHQx3M=
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres-airflow:5433/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: mysecretkey
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: /opt/airflow/logs
    AIRFLOW__CORE__DEFAULT_TIMEZONE: Africa/Cairo
    TZ: Africa/Cairo
    # MinIO credentials for Spark jobs submitted via Airflow
    AWS_ACCESS_KEY_ID: minioadmin
    AWS_SECRET_ACCESS_KEY: minioadmin
  volumes:
    - ./dags:/opt/airflow/dags
    - ./shared:/data
    - ./logs:/opt/airflow/logs
    - ./plugins:/opt/airflow/plugins
    - ./requirements.txt:/opt/airflow/requirements.txt
    - ./pip-cache:/home/airflow/.cache/pip
  user: "50000:0"
  depends_on:
    postgres-airflow:
      condition: service_healthy
  networks:
    - data-platform

services:

  # ===========================================================================
  # DATABASES
  # ===========================================================================

  postgres-airflow:
    image: postgres:13
    container_name: postgres-airflow
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    ports:
      - "5433:5432"
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - data-platform

  postgres-dw:
    image: postgres:15
    container_name: postgres-dw
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: sessiondb
    ports:
      - "5432:5432"
    volumes:
      - postgres_dw_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d sessiondb"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - data-platform

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "8085:80"
    depends_on:
      postgres-dw:
        condition: service_healthy
    networks:
      - data-platform

  # ===========================================================================
  # MINIO — S3-Compatible Object Store (replaces HDFS)
  # Bronze / Silver / Gold buckets = medallion layers
  # Spark connects via s3a:// using AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY
  # ===========================================================================

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # S3 API — Spark uses this via s3a://
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - data-platform

  minio-init:
    image: minio/mc:latest
    container_name: minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin;
        mc mb local/bronze --ignore-existing;
        mc mb local/silver --ignore-existing;
        mc mb local/gold   --ignore-existing;
        echo 'MinIO buckets ready: bronze, silver, gold';
      "
    restart: "no"
    networks:
      - data-platform

  # ===========================================================================
  # REDIS — Pre-aggregation serving layer for Streamlit dashboard
  # Spark Structured Streaming writes running KPI counters here
  # Streamlit reads from here for instant dashboard response
  # ===========================================================================

  redis:
    image: redis:7.2-alpine
    container_name: redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - data-platform

  # ===========================================================================
  # KAFKA STACK — KRaft mode (no Zookeeper required)
  # Confluent 7.6.1 — single broker for local development
  # Topic: olist_orders_stream
  # Listeners:
  #   PLAINTEXT_HOST://localhost:9092  — simulator (from host machine)
  #   PLAINTEXT://broker:29092         — internal (Spark, Kafka Connect)
  # ===========================================================================

  broker:
    image: confluentinc/cp-kafka:7.6.1
    hostname: broker
    container_name: broker
    ports:
      - "9092:9092"   # External — simulator connects here from host
      - "9101:9101"   # JMX metrics
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://broker:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@broker:29093"
      KAFKA_LISTENERS: "PLAINTEXT://broker:29092,CONTROLLER://broker:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_LOG_DIRS: "/tmp/kraft-combined-logs"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 24
    volumes:
      - ./jmx-exporter:/tmp/jmx/
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 15s
    restart: unless-stopped
    networks:
      - data-platform

  kafka-ui:
    image: provectuslabs/kafka-ui:v0.7.2
    container_name: kafka-ui
    ports:
      - "8090:8080"   # UI at localhost:8090
    depends_on:
      broker:
        condition: service_healthy
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: broker:29092
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_NAME: olist-connect
      KAFKA_CLUSTERS_0_KAFKACONNECT_0_ADDRESS: http://kafka-connect:8083
    restart: unless-stopped
    networks:
      - data-platform

  kafka-connect:
    build:
      context: ./kafka-connect
    container_name: kafka-connect
    depends_on:
      broker:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "8083:8083"
    environment:
      CONNECT_BOOTSTRAP_SERVERS: broker:29092
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect
      CONNECT_GROUP_ID: olist-connect-group
      CONNECT_CONFIG_STORAGE_TOPIC: _connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: _connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: _connect-status
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter
      CONNECT_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      CONNECT_VALUE_CONVERTER_SCHEMAS_ENABLE: "false"
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/connectors"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - data-platform

  # ===========================================================================
  # SPARK CLUSTER — apache/spark:3.5.1 (official image, custom build)
  # Built from ./spark/Dockerfile which adds:
  #   - boto3, s3a JARs (hadoop-aws, aws-java-sdk) for MinIO connectivity
  #   - Kafka connector JARs for Structured Streaming
  #   - psycopg2, py4j for PostgreSQL JDBC writes in Gold scripts
  #
  # Three containers:
  #   spark-master   — cluster manager, Web UI at :8080
  #   spark-worker   — one worker node (2g RAM, 2 cores)
  #   spark-streaming — dedicated container that runs the Kafka→Redis stream job
  #
  # Batch jobs (Bronze/Silver/Gold) are submitted by Airflow via spark-submit
  # over the Docker network to spark://spark-master:7077
  # ===========================================================================

  spark-master:
    build:
      context: ./spark
    container_name: spark-master
    environment:
      SPARK_NO_DAEMONIZE: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "8080:8080"   # Spark Master Web UI
      - "7077:7077"   # Spark Master RPC
      - "4040:4040"   # Spark App UI (active job)
    volumes:
      - ./shared:/data           # batch scripts + CSVs + JARs
      - ./spark_jobs:/opt/spark_jobs  # streaming scripts + JARs
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - data-platform

  spark-worker:
    build:
      context: ./spark
    container_name: spark-worker
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      SPARK_NO_DAEMONIZE: "true"
      SPARK_WORKER_MEMORY: 2g
      SPARK_WORKER_CORES: "2"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    ports:
      - "8082:8081"   # Worker Web UI
    volumes:
      - ./shared:/data
      - ./spark_jobs:/opt/spark_jobs
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://spark-master:8080/json/ | grep -q '\"aliveworkers\":0' && exit 1 || exit 0"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped
    networks:
      - data-platform

  spark-streaming:
    build:
      context: ./spark
    container_name: spark-streaming
    depends_on:
      broker:
        condition: service_healthy
      redis:
        condition: service_healthy
      spark-master:
        condition: service_healthy
      spark-worker:
        condition: service_healthy
    environment:
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./spark_jobs:/opt/spark_jobs
    # sleep 20 gives Spark master/worker time to fully register before job is submitted
    command: >
      bash -c "sleep 20 && /opt/spark/bin/spark-submit
        --master spark://spark-master:7077
        --jars /opt/spark_jobs/jars/spark-sql-kafka-0-10_2.12-3.5.1.jar,/opt/spark_jobs/jars/kafka-clients-3.4.0.jar,/opt/spark_jobs/jars/spark-token-provider-kafka-0-10_2.12-3.5.1.jar,/opt/spark_jobs/jars/commons-pool2-2.11.1.jar
        /opt/spark_jobs/streaming_kafka_to_redis.py"
    restart: on-failure
    networks:
      - data-platform

  # ===========================================================================
  # APACHE AIRFLOW — Batch pipeline orchestrator
  # Two containers: webserver + scheduler (LocalExecutor — no Celery needed)
  # Submits spark-submit commands to spark-master via BashOperator
  # DAG: olist_batch_pipeline (bronze → silver → gold_delivery → gold_churn)
  # All batch scripts live in ./shared/scripts/ (mounted as /data)
  # PostgreSQL JAR lives in ./shared/jars/ (mounted as /data/jars)
  # ===========================================================================

  airflow-webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    ports:
      - "8089:8080"   # Airflow UI at localhost:8089
    command: >
      bash -c "
        if [ -f /opt/airflow/requirements.txt ]; then
          pip install --user -r /opt/airflow/requirements.txt;
        fi &&
        airflow db init &&
        airflow users create
          --username admin
          --firstname Air
          --lastname Flow
          --role Admin
          --email admin@example.com
          --password admin || true &&
        exec airflow webserver
      "
    restart: unless-stopped

  airflow-scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    command: >
      bash -c "
        if [ -f /opt/airflow/requirements.txt ]; then
          pip install --user -r /opt/airflow/requirements.txt;
        fi &&
        exec airflow scheduler
      "
    restart: unless-stopped

  # ===========================================================================
  # JUPYTER — Exploration and experimentation
  # Pre-configured with Spark master URL and MinIO credentials
  # Notebooks in ./notebooks, data in ./data
  # ===========================================================================

  jupyter:
    build:
      context: ./jupyter
    container_name: jupyter
    depends_on:
      spark-master:
        condition: service_healthy
    ports:
      - "8888:8888"   # Jupyter at localhost:8888
    environment:
      JUPYTER_TOKEN: olist
      SPARK_MASTER: spark://spark-master:7077
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./spark_jobs:/home/jovyan/spark_jobs
    restart: unless-stopped
    networks:
      - data-platform

  # ===========================================================================
  # STREAMLIT — Real-time operations dashboard
  # Reads pre-aggregated KPIs from Redis every 5 seconds
  # Shows: total orders, revenue, order status, payment types, state map, live feed
  # ===========================================================================

  streamlit:
    build:
      context: ./streamlit
    container_name: streamlit
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8501:8501"   # Dashboard at localhost:8501
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - ./streamlit:/app
    restart: unless-stopped
    networks:
      - data-platform

# =============================================================================
# NETWORK
# =============================================================================

networks:
  data-platform:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================

volumes:
  postgres_airflow_data:    # Airflow metadata
  postgres_dw_data:         # Gold layer data warehouse
  minio_data:               # Bronze / Silver / Gold Parquet files
  redis_data:               # Streaming KPI counters (append-only persistence)
